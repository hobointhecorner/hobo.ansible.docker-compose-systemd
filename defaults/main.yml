---
docker_service_config_dest: /srv

docker_service_user: "{{ docker_service_name }}"
docker_service_group: "{{ docker_service_name }}"

docker_service_config_dir_mode: "2771"
docker_service_config_file_mode: "755"
docker_service_additional_directories: []

docker_service_templates: []
docker_service_templates_notify_handlers: false
