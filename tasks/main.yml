---
- name: Set facts
  ansible.builtin.set_fact:
    docker_service_config_dir: "{{ docker_service_config_dest }}/{{ docker_service_name }}"

- name: Configure service user
  ansible.builtin.include_role:
    role: hobo.service-user
  vars:
    service_user_name: "{{ docker_service_user }}"
    service_user_group_name: "{{ docker_service_group }}"

- name: Ensure service config directory
  become: true
  ansible.builtin.file:
    path: "{{ docker_service_config_dir }}"
    state: directory
    owner: "{{ docker_service_user }}"
    group: "{{ docker_service_group }}"
    mode: "{{ docker_service_config_dir_mode }}"

- name: Ensure additional service directories
  become: true
  loop: "{{ docker_service_additional_directories }}"
  loop_control:
    label: "{{ item.path }}"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner | default(docker_service_user) }}"
    group: "{{ item.group | default(docker_service_group) }}"
    mode: "{{ item.mode | default(docker_service_config_dir_mode) }}"
    state: directory

- name: Ensure systemd service file
  become: true
  notify: Enable and restart docker service
  ansible.builtin.template:
    src: templates/systemd.service.j2
    dest: /etc/systemd/system/{{ docker_service_name }}.service
    owner: root
    group: root
    mode: "755"

- name: Ensure docker-compose file
  become: true
  notify: Enable and restart docker service
  ansible.builtin.copy:
    dest: "{{ docker_service_config_dir }}/docker-compose.yml"
    content: "{{ docker_service_configuration | to_nice_yaml(indent=2, sort_keys=false) }}"
    owner: "{{ docker_service_user }}"
    group: "{{ docker_service_group }}"
    mode: "{{ docker_service_config_file_mode }}"

- name: Ensure service template file(s)
  become: true
  loop: "{{ docker_service_templates }}"
  loop_control:
    label: "{{ item.dest }}"
  notify: |
    {%- if docker_service_templates_notify_handlers | bool -%}
    Enable and restart docker service
    {%- else -%}
    {{ omit }}
    {%- endif -%}
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner | default(docker_service_user) }}"
    group: "{{ item.group | default(docker_service_group) }}"
    mode: "{{ item.mode | default(docker_service_config_file_mode) }}"

- name: Ensure periodic restart cron job
  become: true
  when: docker_service_restart_cron_expr is defined
  ansible.builtin.cron:
    name: "{{ docker_service_name }}-restart"
    job: systemctl stop "{{ docker_service_name }}" && sleep 30 && systemctl start "{{ docker_service_name }}"
    weekday: "{{ (docker_service_restart_cron_expr.split(' '))[4] }}"
    month:   "{{ (docker_service_restart_cron_expr.split(' '))[3] }}"
    day:     "{{ (docker_service_restart_cron_expr.split(' '))[2] }}"
    hour:    "{{ (docker_service_restart_cron_expr.split(' '))[1] }}"
    minute:  "{{ (docker_service_restart_cron_expr.split(' '))[0] }}"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
